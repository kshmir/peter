name: Release to Play Store

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Bump version code
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}

          # Read current version code and increment
          CURRENT=$(grep 'versionCode=' version.properties | cut -d= -f2 | tr -d ' ')
          NEW_CODE=$((CURRENT + 1))

          # Write back
          echo "versionCode=$NEW_CODE" > version.properties
          echo "versionName=$TAG" >> version.properties

          echo "version_name=$TAG" >> $GITHUB_OUTPUT
          echo "version_code=$NEW_CODE" >> $GITHUB_OUTPUT
          echo "Version: $TAG, Code: $NEW_CODE"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > peter-release.jks

      - name: Create keystore.properties
        run: |
          cat > keystore.properties << EOF
          storeFile=peter-release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Create Play service account
        run: echo '${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}' > play-service-account.json

      - name: Run tests
        run: ./gradlew test

      - name: Build release AAB
        run: ./gradlew bundleRelease

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload to Play Store (bundle + listing)
        run: ./gradlew publishReleaseBundle publishReleaseListing

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: peter-${{ steps.version.outputs.version_name }}
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/apk/release/app-release.apk

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.properties
          git commit -m "Bump version code to ${{ steps.version.outputs.version_code }} [skip ci]"
          git push origin main
