name: Release to Play Store

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          VERSION_CODE=$(echo "$TAG" | sed 's/\.//g' | sed 's/^0*//')
          echo "version_name=$TAG" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > peter-release.jks

      - name: Create keystore.properties
        run: |
          cat > keystore.properties << EOF
          storeFile=peter-release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Create Play service account
        run: |
          echo '${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}' > play-service-account.json

      - name: Set version
        run: |
          sed -i "s/versionCode = 1/versionCode = ${{ steps.version.outputs.version_code }}/" app/build.gradle.kts
          sed -i "s/versionName = \"0.1.0\"/versionName = \"${{ steps.version.outputs.version_name }}\"/" app/build.gradle.kts

      - name: Run tests
        run: ./gradlew test

      - name: Build release AAB
        run: ./gradlew bundleRelease

      - name: Upload to Play Store (internal track)
        run: ./gradlew publishReleaseBundle

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: peter-${{ steps.version.outputs.version_name }}
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/apk/release/app-release.apk
